        in: query
        description: This endpoint returns a compact resource, which excludes some properties by default. To include those optional properties, set this query parameter to a comma-separated list of the properties you wish to include.
        required: false
        example:
        - author
        - author.name
        - color
        - created_at
        - created_by
        - created_by.name
        - html_text
        - modified_at
        - text
        - title
        schema:
          type: array
          items:
            type: string
            enum:
            - author
            - author.name
            - color
            - created_at
            - created_by
            - created_by.name
            - html_text
            - modified_at
            - text
            - title
