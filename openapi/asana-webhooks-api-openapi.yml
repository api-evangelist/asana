        - active
        - created_at
        - delivery_retry_count
        - failure_deletion_timestamp
        - filters
        - filters.action
        - filters.fields
        - filters.resource_subtype
        - last_failure_at
        - last_failure_content
        - last_success_at
        - next_attempt_after
        - resource
        - resource.name
        - target
        schema:
          type: array
          items:
            type: string
            enum:
            - active
            - created_at
            - delivery_retry_count
            - failure_deletion_timestamp
            - filters
            - filters.action
            - filters.fields
            - filters.resource_subtype
            - last_failure_at
            - last_failure_content
            - last_success_at
            - next_attempt_after
            - resource
            - resource.name
            - target
        style: form
        explode: false
