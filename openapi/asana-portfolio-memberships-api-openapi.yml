        - portfolio
        - portfolio.name
        - user
        - user.name
        schema:
          type: array
          items:
            type: string
            enum:
            - access_level
            - portfolio
            - portfolio.name
            - user
            - user.name
        style: form
        explode: false
      responses:
        200:
          description: Successfully retrieved the requested portfolio membership.
          content:
            application/json:
              schema:
                type: object
                properties:
