# Asana Conceptual GraphQL Schema
# Derived from the Asana REST API (https://developers.asana.com/reference/rest-api-reference)
# No native GraphQL endpoint exists; this schema is for tooling and catalog enrichment.

scalar DateTime
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum ResourceType {
  task
  project
  portfolio
  workspace
  team
  user
  section
  tag
  custom_field
  story
  attachment
  webhook
  goal
  goal_relationship
  time_period
  job
  organization_export
  user_task_list
  task_template
  project_template
  project_brief
  allocation
  budget
  rate
  audit_log_event
  role
  status_update
}

enum TaskStatus {
  not_started
  in_progress
  completed
}

enum ProjectColor {
  dark_pink
  dark_green
  dark_blue
  dark_red
  dark_teal
  dark_brown
  dark_orange
  dark_purple
  dark_warm_gray
  light_pink
  light_green
  light_blue
  light_red
  light_teal
  light_yellow
  light_orange
  light_purple
  light_warm_gray
  none
}

enum ProjectDefaultView {
  list
  board
  calendar
  timeline
}

enum ProjectStatus {
  on_track
  at_risk
  off_track
  on_hold
}

enum CustomFieldType {
  text
  number
  enum
  multi_enum
  date
  people
}

enum CustomFieldFormat {
  currency
  identifier
  percentage
  custom
  duration
  none
}

enum StoryType {
  comment
  system
}

enum WebhookAction {
  added
  changed
  deleted
  undeleted
}

enum AttachmentParentType {
  task
  project
}

enum JobStatus {
  not_started
  in_progress
  succeeded
  failed
}

enum StatusUpdateType {
  project_status_update
  portfolio_status_update
  goal_status_update
}

enum StatusColor {
  green
  yellow
  red
  blue
}

enum GoalStatus {
  green
  yellow
  red
  missed
  achieved
}

enum GoalRelationshipType {
  supporting_goal
  subgoal
}

enum TimePeriodPeriodType {
  quarterly
  annual
  monthly
  weekly
  custom
}

enum MembershipAccessLevel {
  admin
  editor
  viewer
  commenter
}

enum BudgetType {
  time
  cost
}

enum AuditEventType {
  user_login_succeeded
  user_login_failed
  user_logged_out
  user_deprovisioned
  project_created
  project_deleted
  task_created
  task_deleted
  workspace_setting_updated
}

