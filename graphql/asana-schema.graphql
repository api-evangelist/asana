# ─────────────────────────────────────────────
# Queries
# ─────────────────────────────────────────────

type Query {
  # Tasks
  task(gid: ID!): Task
  tasks(project: ID, section: ID, assignee: ID, workspace: ID, completed_since: String, limit: Int, offset: String): [Task]
  subtasks(task: ID!): [Task]
  taskDependencies(task: ID!): [Task]
  taskDependents(task: ID!): [Task]

  # Projects
  project(gid: ID!): Project
  projects(workspace: ID, team: ID, archived: Boolean, limit: Int, offset: String): [Project]
  projectTaskCounts(project: ID!): TaskCounts
  projectSections(project: ID!): [Section]
  projectMemberships(project: ID!): [ProjectMembership]
  projectCustomFieldSettings(project: ID!): [CustomFieldSetting]
  projectStatuses(project: ID!): [ProjectStatusUpdate]
  projectBrief(project: ID!): ProjectBrief

  # Sections
  section(gid: ID!): Section
  sections(project: ID!): [Section]

  # Tags
  tag(gid: ID!): Tag
  tags(workspace: ID, limit: Int, offset: String): [Tag]
  tagsForTask(task: ID!): [Tag]
  tagsForWorkspace(workspace: ID!): [Tag]

  # Users
  user(gid: ID!): User
  me: User
  users(workspace: ID, team: ID, limit: Int, offset: String): [User]
  userTaskList(user: ID!, workspace: ID!): UserTaskList

  # Workspaces
  workspace(gid: ID!): Workspace
  workspaces(limit: Int, offset: String): [Workspace]
  workspaceMembership(gid: ID!): WorkspaceMembership
  workspaceMemberships(workspace: ID, user: ID, limit: Int, offset: String): [WorkspaceMembership]

  # Teams
  team(gid: ID!): Team
  teams(workspace: ID, organization: ID, limit: Int, offset: String): [Team]
  teamsForUser(user: ID!, organization: ID!): [Team]
  teamMembership(gid: ID!): TeamMembership
  teamMemberships(team: ID, user: ID, workspace: ID, limit: Int, offset: String): [TeamMembership]

  # Portfolios
  portfolio(gid: ID!): Portfolio
  portfolios(workspace: ID!, owner: ID, limit: Int, offset: String): [Portfolio]
  portfolioItems(portfolio: ID!): [Project]
  portfolioMembership(gid: ID!): PortfolioMembership
  portfolioMemberships(portfolio: ID, user: ID, workspace: ID, limit: Int, offset: String): [PortfolioMembership]
  portfolioCustomFieldSettings(portfolio: ID!): [CustomFieldSetting]

  # Goals
  goal(gid: ID!): Goal
  goals(workspace: ID, team: ID, time_period: ID, is_workspace_level: Boolean, limit: Int, offset: String): [Goal]
  goalRelationships(goal: ID!, resource_subtype: GoalRelationshipType): [GoalRelationship]

  # Time Periods
  timePeriod(gid: ID!): TimePeriod
  timePeriods(workspace: ID!, start_on: String, end_on: String): [TimePeriod]

  # Custom Fields
  customField(gid: ID!): CustomField
  customFields(workspace: ID!, limit: Int, offset: String): [CustomField]

  # Stories
  story(gid: ID!): Story
  storiesForTask(task: ID!, limit: Int, offset: String): [Story]
  storiesForProject(project: ID!, limit: Int, offset: String): [Story]

  # Attachments
  attachment(gid: ID!): Attachment
  attachments(parent: ID!, limit: Int, offset: String): [Attachment]

  # Webhooks
  webhook(gid: ID!): Webhook
  webhooks(workspace: ID!, resource: ID, limit: Int, offset: String): [Webhook]

  # Events
  events(resource: ID!, sync: String): EventPage

  # Status Updates
  statusUpdate(gid: ID!): StatusUpdate
  statusUpdates(parent: ID!, limit: Int, offset: String): [StatusUpdate]

  # Jobs
  job(gid: ID!): Job

  # Organization Exports
  organizationExport(gid: ID!): OrganizationExport

  # Task Templates
  taskTemplate(gid: ID!): TaskTemplate
  taskTemplates(project: ID!, limit: Int, offset: String): [TaskTemplate]

  # Project Templates
  projectTemplate(gid: ID!): ProjectTemplate
  projectTemplates(team: ID, limit: Int, offset: String): [ProjectTemplate]

  # Memberships (unified)
  membership(gid: ID!): Membership
  memberships(parent: ID, member: ID, limit: Int, offset: String): [Membership]

  # Allocations
  allocation(gid: ID!): Allocation
  allocations(project: ID, assignee: ID, limit: Int, offset: String): [Allocation]

  # Budgets
  budget(gid: ID!): Budget
  budgets(parent: ID!, limit: Int, offset: String): [Budget]

  # Rates
  rate(gid: ID!): Rate
  rates(project: ID!, limit: Int, offset: String): [Rate]

  # Audit Log
  auditLogEvents(workspace: ID!, start_at: DateTime, end_at: DateTime, event_type: String, actor_type: String, actor_gid: ID, resource_gid: ID, limit: Int, offset: String): [AuditLogEvent]

  # Roles
  role(gid: ID!): Role
  roles(workspace: ID!, limit: Int, offset: String): [Role]

  # Typeahead
  typeahead(workspace: ID!, resource_type: String!, query: String, count: Int): [NamedResource]
}

type EventPage {
  data: [Event]
  sync: String
}

# ─────────────────────────────────────────────
# Mutations
# ─────────────────────────────────────────────

type Mutation {
  # Tasks
  createTask(input: CreateTaskInput!): Task
  updateTask(gid: ID!, input: UpdateTaskInput!): Task
  deleteTask(gid: ID!): DeletePayload
  setParentForTask(task: ID!, parent: ID, insert_before: ID, insert_after: ID): Task
  addProjectToTask(task: ID!, project: ID!, section: ID, insert_before: ID, insert_after: ID): EmptyPayload
  removeProjectFromTask(task: ID!, project: ID!): EmptyPayload
  addFollowersToTask(task: ID!, followers: [ID!]!): Task
  removeFollowerFromTask(task: ID!, followers: [ID!]!): Task
  addTagToTask(task: ID!, tag: ID!): EmptyPayload
  removeTagFromTask(task: ID!, tag: ID!): EmptyPayload
  addDependenciesToTask(task: ID!, dependencies: [ID!]!): EmptyPayload
  removeDependenciesFromTask(task: ID!, dependencies: [ID!]!): EmptyPayload
  addDependentsToTask(task: ID!, dependents: [ID!]!): EmptyPayload
  removeDependentsFromTask(task: ID!, dependents: [ID!]!): EmptyPayload
  duplicateTask(task: ID!, name: String!, include: [String]): Job

  # Projects
  createProject(input: CreateProjectInput!): Project
