# Common / Shared Types
# ─────────────────────────────────────────────

type NamedResource {
  gid: ID!
  resource_type: String!
  name: String
}

type Like {
  gid: ID!
  user: User
}

type TaskCounts {
  num_completed_tasks: Int
  num_completed_milestones: Int
  num_incomplete_tasks: Int
  num_incomplete_milestones: Int
  num_milestones: Int
  num_tasks: Int
}

type Reaction {
  gid: ID!
  resource_type: String!
  emoji: String
  user: User
}

