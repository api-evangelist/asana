  # Status Updates
  createStatusUpdate(parent: ID!, input: CreateStatusUpdateInput!): StatusUpdate
  deleteStatusUpdate(gid: ID!): DeletePayload

  # Teams
  createTeam(input: CreateTeamInput!): Team
  updateTeam(gid: ID!, input: UpdateTeamInput!): Team
