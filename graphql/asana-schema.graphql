  removeUserFromWorkspace2(workspace: ID!, user: ID!): EmptyPayload

  # Task Templates
  instantiateTaskTemplate(task_template: ID!, name: String!): Job
  deleteTaskTemplate(gid: ID!): DeletePayload

  # Project Templates
  deleteProjectTemplate(gid: ID!): DeletePayload

  # Jobs (read-only; no mutations)

  # Memberships
  createMembership(parent: ID!, member: ID!, access_level: MembershipAccessLevel): Membership
