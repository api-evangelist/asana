  # Rule Triggers
  triggerRule(rule_trigger: ID!, data: JSON): EmptyPayload

  # Batch
  batch(actions: [BatchActionInput!]!): [BatchResult]

  # Organization Export
  createOrganizationExport(organization: ID!): OrganizationExport
}

