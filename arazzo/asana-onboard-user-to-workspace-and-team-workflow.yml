arazzo: 1.0.1
info:
  title: Asana Onboard a User to a Workspace and Team
  summary: Add a user to a workspace and then add them to a team within that workspace.
  description: >-
    A member onboarding flow. The workflow adds a user to a workspace and then
    adds that same user to a team inside the workspace so they can collaborate.
    Each request is written inline so the onboarding can be read and executed
    without opening the underlying OpenAPI description.
  version: 1.0.0
sourceDescriptions:
- name: workspacesApi
  url: ../openapi/asana-workspaces-api-openapi.yml
  type: openapi
- name: teamsApi
  url: ../openapi/asana-teams-api-openapi.yml
  type: openapi
workflows:
- workflowId: onboard-user-to-workspace-and-team
  summary: Add a user to a workspace and to a team within it.
  description: >-
    Adds a user to a workspace, then adds the same user to a team.
  inputs:
    type: object
    required:
    - workspaceGid
    - teamGid
    - userIdentifier
    properties:
      workspaceGid:
        type: string
        description: Workspace gid to add the user to.
      teamGid:
        type: string
        description: Team gid to add the user to.
      userIdentifier:
        type: string
        description: User gid or email to add (e.g. me, an email, or a gid).
  steps:
  - stepId: addUserToWorkspace
    description: Add the user to the workspace.
    operationId: addUserForWorkspace
    parameters:
    - name: workspace_gid
      in: path
      value: $inputs.workspaceGid
    requestBody:
      contentType: application/json
      payload:
        data:
          user: $inputs.userIdentifier
    successCriteria:
    - condition: $statusCode == 200
    outputs:
      userGid: $response.body#/data/gid
  - stepId: addUserToTeam
    description: Add the same user to the team.
    operationId: addUserForTeam
    parameters:
    - name: team_gid
      in: path
      value: $inputs.teamGid
    requestBody:
      contentType: application/json
      payload:
        data:
          user: $inputs.userIdentifier
    successCriteria:
    - condition: $statusCode == 200
    outputs:
      membershipResult: $response.body#/data
  outputs:
    workspaceGid: $inputs.workspaceGid
    teamGid: $inputs.teamGid
    userGid: $steps.addUserToWorkspace.outputs.userGid
