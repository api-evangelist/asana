naftiko: 1.0.0-alpha2
info:
  label: Asana Rule Triggers API — Rules
  description: 'Asana Rule Triggers API — Rules. 1 operations. Lead operation: Asana Trigger a rule. Self-contained Naftiko
    capability covering one Asana business surface.'
  tags:
  - Asana
  - Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASANA_API_KEY: ASANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: rule-triggers-rules
    baseUri: https://app.asana.com/api/1.0
    description: Asana Rule Triggers API — Rules business capability. Self-contained, no shared references.
    resources:
    - name: rule_triggers-rule_trigger_gid-run
      path: /rule_triggers/{rule_trigger_gid}/run
      operations:
      - name: triggerrule
        method: POST
        description: Asana Trigger a rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: rule_trigger_gid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: rule-triggers-rules-rest
    port: 8080
    description: REST adapter for Asana Rule Triggers API — Rules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/rule-triggers/{rule-trigger-gid}/run
      name: rule-triggers-rule-trigger-gid-run
      description: REST surface for rule_triggers-rule_trigger_gid-run.
      operations:
      - method: POST
        name: triggerrule
        description: Asana Trigger a rule
        call: rule-triggers-rules.triggerrule
        with:
          rule_trigger_gid: rest.rule_trigger_gid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rule-triggers-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Asana Rule Triggers API — Rules. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: asana-trigger-rule
      description: Asana Trigger a rule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rule-triggers-rules.triggerrule
      with:
        rule_trigger_gid: tools.rule_trigger_gid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
