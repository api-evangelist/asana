    baseUri: https://app.asana.com/api/1.0
    description: Asana Memberships API — Memberships business capability. Self-contained, no shared references.
    resources:
    - name: memberships
      path: /memberships
      operations:
      - name: getmemberships
        method: GET
        description: Asana Get multiple memberships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parent
          in: query
          type: string
        - name: member
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: string
      - name: createmembership
        method: POST
        description: Asana Create a membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: memberships-membership_gid
      path: /memberships/{membership_gid}
      operations:
      - name: getmembership
        method: GET
        description: Asana Get a membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: membership_gid
          in: path
          type: string
          required: true
      - name: updatemembership
        method: PUT
        description: Asana Update a membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: membership_gid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletemembership
        method: DELETE
        description: Asana Delete a membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: membership_gid
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: memberships-memberships-rest
    port: 8080
    description: REST adapter for Asana Memberships API — Memberships. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/memberships
      name: memberships
      description: REST surface for memberships.
      operations:
      - method: GET
        name: getmemberships
        description: Asana Get multiple memberships
        call: memberships-memberships.getmemberships
        with:
          parent: rest.parent
          member: rest.member
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmembership
        description: Asana Create a membership
        call: memberships-memberships.createmembership
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/memberships/{membership-gid}
