    - name: asana-update-membership
      description: Asana Update a membership
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: memberships-memberships.updatemembership
      with:
        membership_gid: tools.membership_gid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-delete-membership
      description: Asana Delete a membership
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: memberships-memberships.deletemembership
      with:
        membership_gid: tools.membership_gid
      outputParameters:
      - type: object
        mapping: $.
