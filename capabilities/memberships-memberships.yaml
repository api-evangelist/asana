    port: 9090
    transport: http
    description: MCP adapter for Asana Memberships API — Memberships. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: asana-get-multiple-memberships
      description: Asana Get multiple memberships
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: memberships-memberships.getmemberships
      with:
        parent: tools.parent
        member: tools.member
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-create-membership
      description: Asana Create a membership
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: memberships-memberships.createmembership
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-membership
      description: Asana Get a membership
      hints:
        readOnly: true
