naftiko: 1.0.0-alpha2
info:
  label: Asana Memberships API — Memberships
  description: 'Asana Memberships API — Memberships. 5 operations. Lead operation: Asana Get multiple memberships. Self-contained
    Naftiko capability covering one Asana business surface.'
  tags:
  - Asana
  - Memberships
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
