      description: REST surface for memberships-membership_gid.
      operations:
      - method: GET
        name: getmembership
        description: Asana Get a membership
        call: memberships-memberships.getmembership
        with:
          membership_gid: rest.membership_gid
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
