naftiko: 1.0.0-alpha2
info:
  label: Asana — Stories
  description: 'Asana — Stories. 5 operations. Lead operation: Asana Get a story. Self-contained Naftiko capability covering
    one Asana business surface.'
  tags:
  - Asana
  - Stories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASANA_API_KEY: ASANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: asana-stories
    baseUri: https://app.asana.com/api/1.0
    description: Asana — Stories business capability. Self-contained, no shared references.
    resources:
    - name: stories-story_gid
      path: /stories/{story_gid}
      operations:
      - name: getstory
        method: GET
        description: Asana Get a story
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
      - name: updatestory
        method: PUT
        description: Asana Update a story
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletestory
        method: DELETE
        description: Asana Delete a story
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tasks-task_gid-stories
      path: /tasks/{task_gid}/stories
      operations:
      - name: getstoriesfortask
        method: GET
        description: Asana Get stories from a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
      - name: createstoryfortask
        method: POST
        description: Asana Create a story on a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: asana-stories-rest
    port: 8080
    description: REST adapter for Asana — Stories. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/stories/{story-gid}
      name: stories-story-gid
      description: REST surface for stories-story_gid.
      operations:
      - method: GET
        name: getstory
        description: Asana Get a story
        call: asana-stories.getstory
        with:
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatestory
        description: Asana Update a story
        call: asana-stories.updatestory
        with:
          opt_fields: rest.opt_fields
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletestory
        description: Asana Delete a story
        call: asana-stories.deletestory
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks/{task-gid}/stories
      name: tasks-task-gid-stories
      description: REST surface for tasks-task_gid-stories.
      operations:
      - method: GET
        name: getstoriesfortask
        description: Asana Get stories from a task
        call: asana-stories.getstoriesfortask
        with:
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createstoryfortask
        description: Asana Create a story on a task
        call: asana-stories.createstoryfortask
        with:
          opt_fields: rest.opt_fields
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: asana-stories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Asana — Stories. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: asana-get-story
      description: Asana Get a story
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asana-stories.getstory
      with:
        opt_fields: tools.opt_fields
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-update-story
      description: Asana Update a story
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: asana-stories.updatestory
      with:
        opt_fields: tools.opt_fields
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-delete-story
      description: Asana Delete a story
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: asana-stories.deletestory
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-stories-task
      description: Asana Get stories from a task
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asana-stories.getstoriesfortask
      with:
        opt_fields: tools.opt_fields
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-create-story-task
      description: Asana Create a story on a task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: asana-stories.createstoryfortask
      with:
        opt_fields: tools.opt_fields
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
