naftiko: 1.0.0-alpha2
info:
  label: Asana Users API — Users
  description: 'Asana Users API — Users. 5 operations. Lead operation: Asana Get users in a team. Self-contained Naftiko capability
    covering one Asana business surface.'
  tags:
  - Asana
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASANA_API_KEY: ASANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-users
    baseUri: https://app.asana.com/api/1.0
    description: Asana Users API — Users business capability. Self-contained, no shared references.
    resources:
    - name: teams-team_gid-users
      path: /teams/{team_gid}/users
      operations:
      - name: getusersforteam
        method: GET
        description: Asana Get users in a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: team_gid
          in: path
          type: string
          required: true
        - name: offset
          in: query
          type: string
    - name: users
      path: /users
      operations:
      - name: getusers
        method: GET
        description: Asana Get multiple users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
        - name: team
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: string
    - name: users-user_gid
      path: /users/{user_gid}
      operations:
      - name: getuser
        method: GET
        description: Asana Get a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_gid
          in: path
          type: string
          description: A string identifying a user. Can be "me", an email, or a gid.
          required: true
    - name: users-user_gid-favorites
      path: /users/{user_gid}/favorites
      operations:
      - name: getfavoritesforuser
        method: GET
        description: Asana Get a user's favorites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_gid
          in: path
          type: string
          required: true
        - name: resource_type
          in: query
          type: string
          required: true
        - name: workspace
          in: query
          type: string
          required: true
    - name: workspaces-workspace_gid-users
      path: /workspaces/{workspace_gid}/users
      operations:
      - name: getusersforworkspace
        method: GET
        description: Asana Get users in a workspace or organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace_gid
          in: path
          type: string
          required: true
        - name: offset
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: users-users-rest
    port: 8080
    description: REST adapter for Asana Users API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams/{team-gid}/users
      name: teams-team-gid-users
      description: REST surface for teams-team_gid-users.
      operations:
      - method: GET
        name: getusersforteam
        description: Asana Get users in a team
        call: users-users.getusersforteam
        with:
          team_gid: rest.team_gid
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: getusers
        description: Asana Get multiple users
        call: users-users.getusers
        with:
          workspace: rest.workspace
          team: rest.team
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user-gid}
      name: users-user-gid
      description: REST surface for users-user_gid.
      operations:
      - method: GET
        name: getuser
        description: Asana Get a user
        call: users-users.getuser
        with:
          user_gid: rest.user_gid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user-gid}/favorites
      name: users-user-gid-favorites
      description: REST surface for users-user_gid-favorites.
      operations:
      - method: GET
        name: getfavoritesforuser
        description: Asana Get a user's favorites
        call: users-users.getfavoritesforuser
        with:
          user_gid: rest.user_gid
          resource_type: rest.resource_type
          workspace: rest.workspace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workspaces/{workspace-gid}/users
      name: workspaces-workspace-gid-users
      description: REST surface for workspaces-workspace_gid-users.
      operations:
      - method: GET
        name: getusersforworkspace
        description: Asana Get users in a workspace or organization
        call: users-users.getusersforworkspace
        with:
          workspace_gid: rest.workspace_gid
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Asana Users API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: asana-get-users-team
      description: Asana Get users in a team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-users.getusersforteam
      with:
        team_gid: tools.team_gid
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-multiple-users
      description: Asana Get multiple users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-users.getusers
      with:
        workspace: tools.workspace
        team: tools.team
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-user
      description: Asana Get a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-users.getuser
      with:
        user_gid: tools.user_gid
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-user-s-favorites
      description: Asana Get a user's favorites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-users.getfavoritesforuser
      with:
        user_gid: tools.user_gid
        resource_type: tools.resource_type
        workspace: tools.workspace
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-users-workspace-organization
      description: Asana Get users in a workspace or organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-users.getusersforworkspace
      with:
        workspace_gid: tools.workspace_gid
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
