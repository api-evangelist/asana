      path: /webhooks/{webhook_gid}
      operations:
      - name: getwebhook
        method: GET
        description: Asana Get a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
      - name: updatewebhook
        method: PUT
        description: Asana Update a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletewebhook
        method: DELETE
        description: Asana Delete a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
