    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: GET
        name: getwebhooks
        description: Asana Get multiple webhooks
        call: asana-webhooks.getwebhooks
        with:
          workspace: rest.workspace
          resource: rest.resource
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
