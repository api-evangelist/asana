        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
          required: true
        - name: owner
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: string
      - name: createportfolio
        method: POST
        description: Asana Create a portfolio
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
