      operations:
      - name: getprojecttemplates
        method: GET
        description: Asana Get multiple project templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace
          in: query
          type: string
        - name: team
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: string
    - name: project_templates-project_template_gid
      path: /project_templates/{project_template_gid}
      operations:
      - name: getprojecttemplate
        method: GET
        description: Asana Get a project template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_template_gid
          in: path
          type: string
          required: true
      - name: deleteprojecttemplate
        method: DELETE
        description: Asana Delete a project template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
