naftiko: 1.0.0-alpha2
info:
  label: Asana Sections API — Sections
  description: 'Asana Sections API — Sections. 7 operations. Lead operation: Asana Get sections in a project. Self-contained
    Naftiko capability covering one Asana business surface.'
  tags:
  - Asana
  - Sections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASANA_API_KEY: ASANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: sections-sections
    baseUri: https://app.asana.com/api/1.0
    description: Asana Sections API — Sections business capability. Self-contained, no shared references.
    resources:
    - name: projects-project_gid-sections
      path: /projects/{project_gid}/sections
      operations:
      - name: getsectionsforproject
        method: GET
        description: Asana Get sections in a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_gid
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: string
      - name: createsectionforproject
        method: POST
        description: Asana Create a section in a project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_gid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-project_gid-sections-insert
      path: /projects/{project_gid}/sections/insert
      operations:
      - name: insertsectionforproject
        method: POST
        description: Asana Move or insert sections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: project_gid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sections-section_gid
      path: /sections/{section_gid}
      operations:
      - name: getsection
        method: GET
        description: Asana Get a section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: section_gid
          in: path
          type: string
          required: true
      - name: updatesection
        method: PUT
        description: Asana Update a section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: section_gid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesection
        method: DELETE
        description: Asana Delete a section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: section_gid
          in: path
          type: string
          required: true
    - name: sections-section_gid-addTask
      path: /sections/{section_gid}/addTask
      operations:
      - name: addtaskforsection
        method: POST
        description: Asana Add task to section
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: section_gid
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: sections-sections-rest
    port: 8080
    description: REST adapter for Asana Sections API — Sections. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/projects/{project-gid}/sections
      name: projects-project-gid-sections
      description: REST surface for projects-project_gid-sections.
      operations:
      - method: GET
        name: getsectionsforproject
        description: Asana Get sections in a project
        call: sections-sections.getsectionsforproject
        with:
          project_gid: rest.project_gid
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsectionforproject
        description: Asana Create a section in a project
        call: sections-sections.createsectionforproject
        with:
          project_gid: rest.project_gid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-gid}/sections/insert
      name: projects-project-gid-sections-insert
      description: REST surface for projects-project_gid-sections-insert.
      operations:
      - method: POST
        name: insertsectionforproject
        description: Asana Move or insert sections
        call: sections-sections.insertsectionforproject
        with:
          project_gid: rest.project_gid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sections/{section-gid}
      name: sections-section-gid
      description: REST surface for sections-section_gid.
      operations:
      - method: GET
        name: getsection
        description: Asana Get a section
        call: sections-sections.getsection
        with:
          section_gid: rest.section_gid
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesection
        description: Asana Update a section
        call: sections-sections.updatesection
        with:
          section_gid: rest.section_gid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesection
        description: Asana Delete a section
        call: sections-sections.deletesection
        with:
          section_gid: rest.section_gid
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sections/{section-gid}/addtask
      name: sections-section-gid-addtask
      description: REST surface for sections-section_gid-addTask.
      operations:
      - method: POST
        name: addtaskforsection
        description: Asana Add task to section
        call: sections-sections.addtaskforsection
        with:
          section_gid: rest.section_gid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sections-sections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Asana Sections API — Sections. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: asana-get-sections-project
      description: Asana Get sections in a project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sections-sections.getsectionsforproject
      with:
        project_gid: tools.project_gid
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-create-section-project
      description: Asana Create a section in a project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sections-sections.createsectionforproject
      with:
        project_gid: tools.project_gid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-move-insert-sections
      description: Asana Move or insert sections
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sections-sections.insertsectionforproject
      with:
        project_gid: tools.project_gid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-section
      description: Asana Get a section
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sections-sections.getsection
      with:
        section_gid: tools.section_gid
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-update-section
      description: Asana Update a section
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sections-sections.updatesection
      with:
        section_gid: tools.section_gid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-delete-section
      description: Asana Delete a section
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sections-sections.deletesection
      with:
        section_gid: tools.section_gid
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-add-task-section
      description: Asana Add task to section
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sections-sections.addtaskforsection
      with:
        section_gid: tools.section_gid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
