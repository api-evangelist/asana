        destructive: false
        idempotent: false
      call: asana-general.createtag
      with:
        opt_fields: tools.opt_fields
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-tag
      description: Asana Get a tag
