    port: 8080
    description: REST adapter for Asana — Attachments. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/attachments
      name: attachments
      description: REST surface for attachments.
      operations:
      - method: GET
        name: getattachmentsforobject
        description: Asana Get attachments from an object
        call: asana-attachments.getattachmentsforobject
        with:
          parent: rest.parent
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
