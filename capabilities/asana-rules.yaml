naftiko: 1.0.0-alpha2
info:
  label: Asana — Rules
  description: 'Asana — Rules. 1 operations. Lead operation: Asana Trigger a rule. Self-contained Naftiko capability covering
    one Asana business surface.'
  tags:
  - Asana
  - Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASANA_API_KEY: ASANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: asana-rules
    baseUri: https://app.asana.com/api/1.0
    description: Asana — Rules business capability. Self-contained, no shared references.
    resources:
    - name: rule_triggers-rule_trigger_gid-run
      path: /rule_triggers/{rule_trigger_gid}/run
      operations:
      - name: triggerrule
        method: POST
        description: Asana Trigger a rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: asana-rules-rest
    port: 8080
    description: REST adapter for Asana — Rules. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/rule-triggers/{rule-trigger-gid}/run
      name: rule-triggers-rule-trigger-gid-run
      description: REST surface for rule_triggers-rule_trigger_gid-run.
      operations:
      - method: POST
        name: triggerrule
        description: Asana Trigger a rule
        call: asana-rules.triggerrule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: asana-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Asana — Rules. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: asana-trigger-rule
      description: Asana Trigger a rule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: asana-rules.triggerrule
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
