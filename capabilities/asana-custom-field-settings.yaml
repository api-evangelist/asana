naftiko: 1.0.0-alpha2
info:
  label: Asana — Custom Field Settings
  description: 'Asana — Custom Field Settings. 2 operations. Lead operation: Asana Get a portfolio''s custom fields. Self-contained
    Naftiko capability covering one Asana business surface.'
  tags:
  - Asana
  - Custom Field Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ASANA_API_KEY: ASANA_API_KEY
capability:
  consumes:
  - type: http
    namespace: asana-custom-field-settings
    baseUri: https://app.asana.com/api/1.0
    description: Asana — Custom Field Settings business capability. Self-contained, no shared references.
    resources:
    - name: portfolios-portfolio_gid-custom_field_settings
      path: /portfolios/{portfolio_gid}/custom_field_settings
      operations:
      - name: getcustomfieldsettingsforportfolio
        method: GET
        description: Asana Get a portfolio's custom fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
    - name: projects-project_gid-custom_field_settings
      path: /projects/{project_gid}/custom_field_settings
      operations:
      - name: getcustomfieldsettingsforproject
        method: GET
        description: Asana Get a project's custom fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: opt_fields
          in: query
          type: array
          description: This endpoint returns a compact resource, which excludes some properties by default. To include those
            optional properties, set this query parameter to a comma-s
    authentication:
      type: bearer
      token: '{{env.ASANA_API_KEY}}'
  exposes:
  - type: rest
    namespace: asana-custom-field-settings-rest
    port: 8080
    description: REST adapter for Asana — Custom Field Settings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/portfolios/{portfolio-gid}/custom-field-settings
      name: portfolios-portfolio-gid-custom-field-settings
      description: REST surface for portfolios-portfolio_gid-custom_field_settings.
      operations:
      - method: GET
        name: getcustomfieldsettingsforportfolio
        description: Asana Get a portfolio's custom fields
        call: asana-custom-field-settings.getcustomfieldsettingsforportfolio
        with:
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-gid}/custom-field-settings
      name: projects-project-gid-custom-field-settings
      description: REST surface for projects-project_gid-custom_field_settings.
      operations:
      - method: GET
        name: getcustomfieldsettingsforproject
        description: Asana Get a project's custom fields
        call: asana-custom-field-settings.getcustomfieldsettingsforproject
        with:
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: asana-custom-field-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Asana — Custom Field Settings. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: asana-get-portfolio-s-custom-fields
      description: Asana Get a portfolio's custom fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asana-custom-field-settings.getcustomfieldsettingsforportfolio
      with:
        opt_fields: tools.opt_fields
      outputParameters:
      - type: object
        mapping: $.
    - name: asana-get-project-s-custom-fields
      description: Asana Get a project's custom fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asana-custom-field-settings.getcustomfieldsettingsforproject
      with:
        opt_fields: tools.opt_fields
      outputParameters:
      - type: object
        mapping: $.
