    resources:
    - path: /v1/task-templates
      name: task-templates
      description: REST surface for task_templates.
      operations:
      - method: GET
        name: gettasktemplates
        description: Asana Get multiple task templates
        call: asana-task-templates.gettasktemplates
        with:
          project: rest.project
          opt_fields: rest.opt_fields
        outputParameters:
        - type: object
          mapping: $.
